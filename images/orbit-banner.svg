<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg-glow)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="#f1f5f9" opacity="0.6"/>
  <circle cx="120" cy="80" r="0.8" fill="#f1f5f9" opacity="0.4"/>
  <circle cx="200" cy="20" r="1.2" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="300" cy="60" r="0.7" fill="#f1f5f9" opacity="0.3"/>
  <circle cx="450" cy="25" r="1" fill="#f1f5f9" opacity="0.6"/>
  <circle cx="550" cy="50" r="0.8" fill="#f1f5f9" opacity="0.4"/>
  <circle cx="650" cy="30" r="1.1" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="720" cy="70" r="0.9" fill="#f1f5f9" opacity="0.3"/>
  <circle cx="780" cy="20" r="0.7" fill="#f1f5f9" opacity="0.6"/>
  <circle cx="80" cy="250" r="0.8" fill="#f1f5f9" opacity="0.4"/>
  <circle cx="180" cy="270" r="1" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="350" cy="260" r="0.7" fill="#f1f5f9" opacity="0.3"/>
  <circle cx="500" cy="280" r="1.2" fill="#f1f5f9" opacity="0.4"/>
  <circle cx="620" cy="250" r="0.8" fill="#f1f5f9" opacity="0.6"/>
  <circle cx="750" cy="270" r="1" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="30" cy="150" r="0.6" fill="#f1f5f9" opacity="0.3"/>
  <circle cx="770" cy="150" r="0.9" fill="#f1f5f9" opacity="0.4"/>

  <!-- Center glow -->
  <circle cx="400" cy="130" r="100" fill="url(#center-glow)"/>

  <!-- Orbital rings -->
  <ellipse cx="400" cy="130" rx="90" ry="90" stroke="#00d4ff" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="400" cy="130" rx="60" ry="60" stroke="#7c3aed" stroke-width="0.8" opacity="0.2"/>

  <!-- Orbital nodes — O R B I T -->
  <circle cx="400" cy="40" r="10" fill="#00d4ff" opacity="0.2" filter="url(#glow)"/>
  <circle cx="400" cy="40" r="6" fill="#030712" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="400" y="44" text-anchor="middle" fill="#00d4ff" font-family="Space Grotesk, sans-serif" font-size="9" font-weight="700">O</text>

  <circle cx="486" cy="100" r="10" fill="#7c3aed" opacity="0.2" filter="url(#glow)"/>
  <circle cx="486" cy="100" r="6" fill="#030712" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="486" y="104" text-anchor="middle" fill="#7c3aed" font-family="Space Grotesk, sans-serif" font-size="9" font-weight="700">R</text>

  <circle cx="456" cy="205" r="10" fill="#f59e0b" opacity="0.2" filter="url(#glow)"/>
  <circle cx="456" cy="205" r="6" fill="#030712" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="456" y="209" text-anchor="middle" fill="#f59e0b" font-family="Space Grotesk, sans-serif" font-size="9" font-weight="700">B</text>

  <circle cx="344" cy="205" r="10" fill="#10b981" opacity="0.2" filter="url(#glow)"/>
  <circle cx="344" cy="205" r="6" fill="#030712" stroke="#10b981" stroke-width="1.5"/>
  <text x="344" y="209" text-anchor="middle" fill="#10b981" font-family="Space Grotesk, sans-serif" font-size="9" font-weight="700">I</text>

  <circle cx="314" cy="100" r="10" fill="#f43f5e" opacity="0.2" filter="url(#glow)"/>
  <circle cx="314" cy="100" r="6" fill="#030712" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="314" y="104" text-anchor="middle" fill="#f43f5e" font-family="Space Grotesk, sans-serif" font-size="9" font-weight="700">T</text>

  <!-- Center node — YOU -->
  <circle cx="400" cy="130" r="14" fill="#00d4ff" opacity="0.1" filter="url(#glow-strong)"/>
  <circle cx="400" cy="130" r="8" fill="#030712" stroke="#f1f5f9" stroke-width="1.5"/>
  <circle cx="400" cy="130" r="3" fill="#f1f5f9"/>

  <!-- Title text -->
  <text x="400" y="265" text-anchor="middle" fill="#f1f5f9" font-family="Space Grotesk, sans-serif" font-size="42" font-weight="700" letter-spacing="-1">ORBIT</text>
  <text x="400" y="288" text-anchor="middle" fill="#94a3b8" font-family="DM Sans, sans-serif" font-size="13" font-weight="400">Route work between AI agents</text>
</svg>
